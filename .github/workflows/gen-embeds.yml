# regenerates the /p/ embed stubs whenever the art data changes,
# so sharing /p/<slug> always embeds the right image — no manual runs.
name: gen embeds

on:
  push:
    branches: [main]
    paths:
      - js/data.js
      - scripts/gen_embeds.py

permissions:
  contents: write

jobs:
  embeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/gen_embeds.py
      - name: commit stubs if they changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add p/
          git diff --cached --quiet || { git commit -m "regen embed stubs"; git push; }
